[pytest]
# Scope collection to tests/ and use importlib mode so a stray sibling copy of
# the lab can't trigger a "import file mismatch" on duplicate test basenames.
addopts = tests
testpaths = tests
# Put the repo root on sys.path so `from pipeline import ...` resolves no matter
# where pytest is invoked from (root isn't auto-added in default import mode).
pythonpath = .
